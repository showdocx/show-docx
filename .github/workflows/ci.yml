name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Core checks (${{ matrix.os }})
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run check-types
      - run: npm run test:unit

      - name: Extension Host tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:integration

      - name: Extension Host tests
        if: runner.os != 'Linux'
        run: npm run test:integration

  webview-and-package:
    name: Webview and VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm audit
      - run: npx playwright install --with-deps chromium
      - run: npm run test:webview
      - run: npm run package

      - uses: actions/upload-artifact@v4
        with:
          name: show-docx-vsix
          path: show-docx-*.vsix
          if-no-files-found: error
          retention-days: 14
